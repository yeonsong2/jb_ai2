name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile
        run: |
          python -m py_compile app.py risk_engine.py constants.py app_config.py data_loader.py healthcheck.py ui_components.py pdf_export.py

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -v
